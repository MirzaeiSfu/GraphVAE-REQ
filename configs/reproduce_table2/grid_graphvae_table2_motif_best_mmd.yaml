# Paper-style reproduction config for Kia paper Table 2, Grid / GraphVAE
# with relational motif-count loss and best validation MMD checkpoint selection.
#
# This is intentionally separate from grid_graphvae_table2_motif.yaml so the
# previous final-epoch motif run is not overwritten or behavior-changed.

data:
  dataset: GRID
  use_feature: true
  bfsOrdering: true
  bfs_strategy: legacy_first_component
  directed: true
  database_name: grid_undir_feat_snap_7a58e6
  graph_type: homogeneous
  graph_index_start: null
  graph_index_end: null
  data_dir: null
  split_mode: paper_70_10_20

model:
  model: GraphVAE
  encoder_type: AvePool
  decoder: FC
  graphEmDim: 1024
  beta: null

experiment:
  epoch_number: 20000
  Vis_step: 1000
  redraw: false
  lr: 0.0003
  train_batch_size: 200
  task: graphGeneration

motif:
  motif_loss: true
  motif_loss_mode: abs_log_ratio
  motif_temperature_start: 1.0
  motif_temperature_end: 0.5
  motif_temperature_anneal_start_frac: 0.5
  rule_prune: false
  motif_batch_size: 50000

loss:
  alpha_kernel_cost: 1.0
  alpha_node_feat: 10.0
  alpha_edge_feat: 10.0
  alpha_motif_loss: 1.0
  edge_count_loss: false
  edge_count_loss_mode: abs_log_ratio
  alpha_edge_count: 0.0
  alpha_adj_recon: 0.01

runtime:
  run_label: grid-table2-graphvae-motif-best-mmd-v1
  graph_save_path: runs/table2_reproduction/grid_graphvae_motif_best_mmd
  dataset_cache_dir: runs/table2_reproduction/dataset_cache
  motif_cache_dir: null
  PATH: model
  UseGPU: true
  device: cuda:0
  plot_testGraphs: true
  ideal_Evalaution: false
  keep_best_validation_mmd: true
  best_validation_mmd_metric: normalized_table2
  save_validation_checkpoints: false
  tiny_overfit: false
  tiny_overfit_size: 32
  interactive: false
  sanity_check: false
  sanity_check_only: false
