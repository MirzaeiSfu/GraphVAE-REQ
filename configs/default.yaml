#===============================
# Data arguments
#===============================
data:
  dataset: QM9
  use_feature: true
  bfsOrdering: true
  bfs_strategy: all_components
  directed: false
  database_name: qm9_experiment
  graph_type: homogeneous
  graph_index_start: null
  graph_index_end: null
  data_dir: null
  split_mode: legacy_80_20

#===============================
# Model arguments
#===============================
model:
  model: GraphVAE
  encoder_type: AvePool
  decoder: FC
  graphEmDim: 1024
  beta: null

#===============================
# Experiment arguments
#===============================
experiment:
  epoch_number: 20000
  Vis_step: 2
  redraw: false
  lr: 0.0003
  train_batch_size: 200
  task: graphGeneration

#===============================
# Motif arguments
#===============================
motif:
  motif_loss: false
  motif_loss_mode: abs_log_ratio
  motif_temperature_start: 1.0
  motif_temperature_end: 0.5
  motif_temperature_anneal_start_frac: 0.5
  rule_prune: false
  motif_batch_size: 50000

#===============================
# Loss arguments
#===============================
loss:
  alpha_kernel_cost: 0.0
  alpha_node_feat: 10.0
  alpha_edge_feat: 10.0
  alpha_motif_loss: 1.0
  alpha_adj_recon: 0.01

#===============================
# Runtime, output, and evaluation arguments
#===============================
runtime:
  graph_save_path: null
  dataset_cache_dir: null
  motif_cache_dir: null
  PATH: model
  UseGPU: true
  device: cuda
  plot_testGraphs: true
  ideal_Evalaution: false
  tiny_overfit: false
  tiny_overfit_size: 32
  interactive: false
  sanity_check: false
  sanity_check_only: false
